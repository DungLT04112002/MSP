services:
  mongo:
    image: mongo:7.0
    container_name: msp-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  discovery-server:
    build:
      context: ./discovery-server/discovery-server
    container_name: msp-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8761/actuator/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 90s

  product-service:
    build:
      context: ./product-service/product-service
    container_name: msp-product
    ports:
      - "8087:8087"
    depends_on:
      mongo:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8087/actuator/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 90s

  order-service:
    build:
      context: ./order-service/order-service
    container_name: msp-order
    ports:
      - "8088:8088"
    depends_on:
      mongo:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/actuator/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 90s

  api-gateway:
    build:
      context: ./api-gateway
    container_name: msp-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 90s

volumes:
  mongo-data:
