spring.application.name=api-gateway

# Cổng cho API Gateway
server.port=8080

# Cấu hình Eureka Client để đăng ký vào Discovery Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Sử dụng Spring Cloud Gateway (qua cấu hình properties)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Định nghĩa riêng một số route quan trọng
# Route tới product-service
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/product/**

# Route tới order-service
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/order/**

# Log cho gateway (nếu cần debug routing)
logging.level.org.springframework.cloud.gateway=INFO
