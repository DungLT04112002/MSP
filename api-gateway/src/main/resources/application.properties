spring.application.name=api-gateway
server.port=8080

# Kết nối tới Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Cho phép Gateway tự động tìm Service ID trong Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
# --- Route cho Service 01 ---
spring.cloud.gateway.server.webmvc.routes[0].id=product-route1
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/product,/api/product/**